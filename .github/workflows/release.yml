name: Release

# Tag a commit (e.g. `git tag v1.0.0 && git push --tags`) to build, sign and publish.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write        # create the GitHub Release
  id-token: write        # SignPath OIDC trust

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF_NAME -match '^v') { $env:GITHUB_REF_NAME -replace '^v','' } else { '0.0.0-dev' }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Set up MinGW (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: msys2 {0}
        run: echo "$(cygpath -w /mingw64/bin)" >> "$GITHUB_PATH"

      - name: Build smooly.exe
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build.ps1

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.ver.outputs.version }} installer\smooly.iss

      - name: Build portable zip
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force dist,stage | Out-Null
          Copy-Item smooly.exe,README.md,LICENSE stage
          Copy-Item cursors,fonts stage -Recurse
          Compress-Archive -Path "stage\*" -DestinationPath "dist\smooly-$v-portable.zip" -Force

      - name: Upload unsigned artifacts (input for signing)
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: smooly-unsigned
          path: dist

      # --- Code signing via SignPath Foundation (free, OSS) ---
      # One-time setup: see docs/SIGNING.md. Requires the SIGNPATH_API_TOKEN secret
      # and SIGNPATH_ORGANIZATION_ID variable. If they're absent, the release is
      # published unsigned (SmartScreen may warn) — signing turns on automatically
      # once the secrets exist, no workflow edit needed.
      - name: Check signing availability
        id: signing
        shell: pwsh
        env:
          TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          $on = -not [string]::IsNullOrWhiteSpace($env:TOKEN)
          "enabled=$($on.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Sign with SignPath
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: smooly
          signing-policy-slug: release-signing
          artifact-configuration-slug: initial
          github-artifact-id: ${{ steps.artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed

      - name: Select release directory
        id: rel
        shell: pwsh
        run: |
          $dir = if ("${{ steps.signing.outputs.enabled }}" -eq 'true') { 'dist-signed' } else { 'dist' }
          "dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rel.outputs.dir }}/smooly-${{ steps.ver.outputs.version }}-setup.exe
            ${{ steps.rel.outputs.dir }}/smooly-${{ steps.ver.outputs.version }}-portable.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
