; manifest.ini — describes one cursor theme built from PNG artwork.
; Consumed by tools/build-cursors.ps1, which resamples each PNG to every size
; and emits cursors/<name>/<Size>/*.cur + install.inf that smooly auto-discovers.
;
; HOW TO USE
;   1. Export each cursor from the Figma file as a square PNG (transparent bg).
;      Export at HIGH resolution (e.g. 256x256) — the build downscales crisply.
;   2. Drop the PNGs in this folder using the file names in [roles] below
;      (or edit the names to match your exports).
;   3. Run:  powershell -ExecutionPolicy Bypass -File tools\build-cursors.ps1
;
; Hotspots are given in a 32px reference space (0,0 = top-left) and are scaled
; automatically for each output size. The hotspot is the pixel that actually
; "points" — the arrow tip, the I-beam centre, the fingertip, etc.
;
; Any role you leave out (no PNG / commented) falls back to the Windows default
; for that cursor — so a partial pack is fine.

[theme]
name        = HugeIcons
; Attribution is copied verbatim into cursors/ATTRIBUTION.txt guidance and the
; generated install.inf comment. CC BY 4.0 requires crediting the author.
attribution = "Mouse Icons by Hugeicons — Figma Community, CC BY 4.0"

; Output sizes (px). Regular/Large/Extra-Large match the Bibata folder layout
; smooly already understands; "Small" is produced by smooly at runtime.
[sizes]
Regular      = 32
Large        = 48
Extra-Large  = 64

; role = sourcePng, hotspotX, hotspotY      (hotspot in 32px space)
[roles]
pointer      = pointer.png,     8,  2
help         = help.png,        8,  2
unavailable  = unavailable.png, 8,  2
text         = text.png,       16, 16
link         = link.png,        8,  5
move         = move.png,       16, 16
vert         = vert.png,       16, 16
horz         = horz.png,       16, 16
; Not provided by this pack (fall back to the Windows default):
;   cross (crosshair), dgn1/dgn2 (diagonal resize), alternate (up-arrow),
;   work/busy (animated spinners). Drop matching PNGs/.ani here to add them.

; Animated roles (spinner / busy). PNGs can't animate, so drop pre-made .ani
; files here and they are copied verbatim into every size folder. Leave these
; out to keep the Windows default spinners.
[copy]
; work = work.ani
; busy = busy.ani
