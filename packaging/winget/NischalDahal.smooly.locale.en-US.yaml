ShortDescription: Smooth momentum scrolling, pointer tuning, cursor themes and button remapping for Windows.
Description: >-
  smooly makes any ordinary mouse feel like a premium one: momentum smooth
  scrolling with per-app exclusions, OS pointer speed/acceleration control,
  shake-to-locate, bundled cursor themes and sizes, and Mac-Mouse-Fix-style
  button remapping (Click / Double-Click / Hold / Click+Scroll / Click+Drag,
  including keyboard shortcuts and type-text macros).
